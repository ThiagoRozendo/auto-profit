services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoprofit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: gateway
      PORT: 3001
      AUTH_SERVICE_URL: http://auth-service:3002
      VEHICLE_SERVICE_URL: http://vehicle-service:3003
      EXPENSE_SERVICE_URL: http://expense-service:3004
      DATABASE_URL: ""
      SHADOW_DATABASE_URL: ""
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - rabbitmq

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: auth-service
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=auth
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=auth
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - rabbitmq

  vehicle-service:
    build:
      context: ./vehicle-service
      dockerfile: Dockerfile
    container_name: vehicle-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: vehicle-service
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=vehicle
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=vehicle
      RABBITMQ_URL: amqp://rabbitmq:5672
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - rabbitmq

  expense-service:
    build:
      context: ./expense-service
      dockerfile: Dockerfile
    container_name: expense-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: expense-service
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=expense
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=expense
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - rabbitmq

  pricing-service:
    build:
      context: ./pricing-service
      dockerfile: Dockerfile
    container_name: pricing-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: pricing-service
      PORT: 3005
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=pricing
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=pricing
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3005:3005"
    depends_on:
      - postgres
      - rabbitmq

  report-service:
    build:
      context: ./report-service
      dockerfile: Dockerfile
    container_name: report-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: report-service
      PORT: 3006
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=report
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=report
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: notification-service
      PORT: 3007
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit?schema=notification
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoprofit_shadow?schema=notification
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: development-secret
      SWAGGER_DOCS: "true"
      SWAGGER_ROUTE: api
      API_DOCS_UI: scalar
    ports:
      - "3007:3007"
    depends_on:
      - postgres
      - rabbitmq

volumes:
  postgres_data:
